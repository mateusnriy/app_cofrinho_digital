name: cofrinho_digital
description: Aplicativo de metas financeiras pessoais
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^17.2.2
  fl_chart: ^0.68.0
  uuid: ^4.4.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  
  # Dependências adicionadas para o fuso horário das notificações
  timezone: ^0.9.2
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_launcher_icons: "^0.13.1"

  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: 2.4.0

flutter_launcher_icons:
    android: "launcher_icon"
    ios: false
    image_path: "lib/assets/icon/logo.png"
    min_sdk_android: 21

flutter:
  uses-material-design: true